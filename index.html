<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#07070e;color:#ddd;font-family:'Noto Sans KR',sans-serif;overflow:hidden;}
#app{width:100vw;height:100vh;position:relative;}
canvas{position:absolute;top:0;left:0;width:100%;height:100%;cursor:grab;}
canvas:active{cursor:grabbing;}
#topbar{position:absolute;top:0;left:0;right:0;height:44px;background:rgba(5,5,15,0.92);backdrop-filter:blur(8px);border-bottom:0.5px solid rgba(120,115,200,0.2);display:flex;align-items:center;padding:0 14px;gap:12px;z-index:20;}
#title{font-size:13px;font-weight:500;color:#ccc9ff;letter-spacing:0.5px;white-space:nowrap;}
#subtitle{font-size:10px;color:rgba(255,255,255,0.3);}
#controls{display:flex;gap:5px;margin-left:auto;}
#controls button{font-size:11px;padding:4px 10px;background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.18);color:rgba(255,255,255,0.65);border-radius:6px;cursor:pointer;transition:background 0.15s;}
#controls button:hover{background:rgba(255,255,255,0.15);}
#hint{position:absolute;top:52px;left:12px;font-size:9px;color:rgba(255,255,255,0.2);z-index:5;line-height:1.6;}
#legend{position:absolute;bottom:12px;left:12px;display:flex;flex-wrap:wrap;gap:6px;max-width:320px;z-index:10;}
#legend span{font-size:9px;color:rgba(255,255,255,0.38);display:flex;align-items:center;gap:3px;}
#legend i{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block;}
#card{position:absolute;bottom:0;left:0;right:0;background:rgba(5,5,18,0.97);border-top:0.5px solid rgba(120,115,200,0.25);padding:12px 16px 14px;display:none;z-index:30;max-height:200px;overflow-y:auto;}
#card-close{position:absolute;top:8px;right:12px;background:none;border:none;color:#554;cursor:pointer;font-size:14px;line-height:1;}
#card-close:hover{color:#998;}
#cn{font-size:15px;font-weight:500;color:#ddd8ff;margin:0 0 2px;}
#cl{font-size:10px;color:#4a4875;margin:0 0 5px;}
#cq{font-size:11px;color:#887ec8;font-style:italic;border-left:2px solid #534AB7;padding-left:7px;margin:0 0 5px;line-height:1.5;}
#cs{font-size:12px;color:#9a98c0;line-height:1.5;margin:0 0 6px;}
#ct{margin:0 0 5px;}
#ct span{display:inline-block;margin:1px 2px;padding:2px 8px;background:rgba(100,95,180,0.15);border-radius:10px;font-size:10px;color:#7875b8;}
#cw{font-size:10px;color:#4a4875;margin:0 0 4px;}
#cr{font-size:10px;color:#504d78;line-height:1.6;}
#tip{position:absolute;background:rgba(5,5,18,0.95);border:0.5px solid rgba(120,115,200,0.35);border-radius:5px;padding:3px 9px;font-size:11px;color:#bbb8e8;pointer-events:none;display:none;z-index:40;white-space:nowrap;}
</style>

<script>
const RAW = {"n": [["descartes", "데카르트", "1596–1650", 129, 90, 15.5, "#7F77DD", "'나는 생각한다 고로 존재한다'. 모든 것을 의심하고 확실한 지식의 토대를 새로 세운 근대철학의 아버지.", "내가 확실히 알 수 있는 것은 무엇인가?", "코기토|방법적회의|심신이원론|합리주의", "방법서설|성찰|철학의 원리", 0.95, 0.9], ["spinoza", "스피노자", "1632–1677", 427, 90, 14.8, "#7F77DD", "신이 곧 자연이다. 기하학적 방법으로 철학을 체계화. 파문당한 위험한 사상가.", "신과 자연은 하나인가? 인간은 어떻게 자유로울 수 있는가?", "신즉자연|에티카|일원론|자유와필연", "에티카|신학정치론|지성교정론", 0.88, 0.72], ["leibniz", "라이프니츠", "1646–1716", 543, 90, 14.5, "#7F77DD", "모나드론과 예정조화. '최선의 세계' 낙관론. 뉴턴과 미적분 우선권 논쟁.", "세계는 무엇으로 이루어져 있는가? 이 세계는 가능한 세계 중 최선인가?", "단자론|예정조화|낙관론|미적분", "단자론|신인간지성론|변신론", 0.85, 0.68], ["locke", "존 로크", "1632–1704", 427, 320, 15.0, "#1D9E75", "인간은 백지 상태로 태어난다. 경험론과 자유주의 정치철학의 토대. 미국 독립선언문에 직접 영향.", "우리는 어떻게 지식을 얻는가? 국가 권력의 정당한 근거는 무엇인가?", "백지설|경험론|사회계약|자유주의", "인간지성론|통치론|관용에 관한 편지", 0.9, 0.85], ["hume", "데이비드 흄", "1711–1776", 1081, 320, 14.8, "#1D9E75", "인과율은 경험의 습관. 자아는 지각의 다발. 칸트를 '독단의 잠에서 깨웠다'.", "우리는 인과관계를 정말 알 수 있는가? 자아는 실재하는가?", "인과율회의|자아해체|경험론|회의주의", "인간본성론|인간지성에 관한 탐구|도덕원리에 관한 탐구", 0.88, 0.82], ["rousseau", "루소", "1712–1778", 1089, 220, 14.8, "#EF9F27", "'인간은 자유롭게 태어났지만 어디서나 사슬에 묶여 있다.' 일반의지와 자연 상태론.", "인간은 본래 선한가? 불평등의 기원은 무엇인가?", "일반의지|사회계약|자연으로돌아가라|교육철학", "사회계약론|에밀|인간불평등기원론", 0.88, 0.8], ["voltaire", "볼테르", "1694–1778", 940, 220, 14.2, "#EF9F27", "계몽주의의 날카로운 목소리. 종교적 광신과 전제주의 비판. 라이프니츠 낙관론을 캉디드로 풍자.", "종교적 관용과 이성적 사회는 어떻게 가능한가?", "관용|계몽주의|반종교|풍자", "캉디드|관용론|영국에 관한 편지", 0.82, 0.75], ["kant", "칸트", "1724–1804", 1188, 110, 15.8, "#7F77DD", "합리론과 경험론의 통합. 인식의 코페르니쿠스적 전환. 도덕법칙의 자율성. 삼비판서.", "우리는 무엇을 알 수 있는가? 어떻게 행동해야 하는가? 무엇을 희망할 수 있는가?", "비판철학|정언명령|물자체|선천적종합판단", "순수이성비판|실천이성비판|판단력비판", 0.98, 0.88], ["schiller", "실러", "1759–1805", 1478, 155, 13.8, "#888780", "'인간은 놀이할 때만 온전히 인간이다.' 칸트 미학을 계승해 놀이충동 개념으로 발전시킨 놀이철학의 시조.", "미적 교육이 어떻게 인간을 자유롭게 하는가?", "놀이충동|미적교육|형식충동|감각충동", "인간의미적교육에관하여|소박문학과감상문학에관하여|군도", 0.78, 0.65], ["fichte", "피히테", "1762–1814", 1502, 110, 13.8, "#7F77DD", "나=나. 자아에서 세계를 도출. 독일 민족주의의 철학적 아버지.", "자아는 어떻게 세계를 구성하는가?", "자아철학|관념 r", "heidegger", "동시대논쟁", 0.85, "#D4537E", "1929년 다보스에서 칸트 해석을 두고 역사적 논쟁을 벌였다."], ["bachler", "althusser", "계승", 0.72, "#7F77DD", "알튀세르는 바슐라르의 인식론적 단절 개념을 마르크스 독해에 적용했다."], ["bachler", "foucault", "배경영향", 0.7, "#B4B2A9", "푸코는 바슐라르와 캉길렘의 과학사 방법론에서 에피스테메 개념을 발전시켰다."]], "w": 3800};

const canvas = document.getElementById('cv');
const ctx = canvas.getContext('2d');
const app = document.getElementById('app');

let W, H;
function resize(){
  W = app.clientWidth; H = app.clientHeight;
  canvas.width = W; canvas.height = H;
  draw();
}
window.addEventListener('resize', resize);

const PH = {};
RAW.n.forEach(n => {
  PH[n[0]] = {
    id:n[0], name:n[1], life:n[2], x:n[3], y:n[4],
    r:n[5], color:n[6], summary:n[7], q:n[8],
    themes:n[9].split('|').filter(Boolean),
    works:n[10].split('|').filter(Boolean),
    inf:n[11], beg:n[12]
  };
});

const LINKS = RAW.l.map(l => ({s:l[0],t:l[1],type:l[2],str:l[3],color:l[4],desc:l[5]}));
const CW = RAW.w, CH = 700;

let ox = 0, oy = 50, sc = 1;
let drag = false, lx = 0, ly = 0, moved = false;
let sel = null, hovId = null;

// 배경 별
const STARS = Array.from({length:120}, () => [Math.random()*CW, Math.random()*CH]);

function w2s(x,y){return {x:x*sc+ox, y:y*sc+oy};}
function s2w(x,y){return {x:(x-ox)/sc, y:(y-oy)/sc};}

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#07070e'; ctx.fillRect(0,0,W,H);

  // 별
  ctx.fillStyle='rgba(255,255,255,0.22)';
  STARS.forEach(([sx,sy])=>{
    const p=w2s(sx,sy);
    if(p.x>-2&&p.x<W+2&&p.y>-2&&p.y<H+2){
      ctx.beginPath(); ctx.arc(p.x,p.y,0.55,0,Math.PI*2); ctx.fill();
    }
  });

  // 연도 눈금
  ctx.setLineDash([3,6]); ctx.lineWidth=0.5;
  ctx.strokeStyle='rgba(255,255,255,0.05)';
  [1600,1650,1700,1750,1800,1850,1900,1950,2000].forEach(yr=>{
    const fx=80+(yr-1590)/(2030-1590)*(CW-160);
    const p=w2s(fx,0);
    if(p.x>0&&p.x<W){
      ctx.beginPath(); ctx.moveTo(p.x,44); ctx.lineTo(p.x,H); ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,0.15)';
      ctx.font='9px sans-serif'; ctx.textAlign='center';
      ctx.fillText(yr,p.x,H-6);
    }
  });
  ctx.setLineDash([]);

  // 링크
  LINKS.forEach(l=>{
    const a=PH[l.s], b=PH[l.t];
    if(!a||!b) return;
    const pa=w2s(a.x,a.y), pb=w2s(b.x,b.y);
    const mx=(pa.x+pb.x)/2, my=(pa.y+pb.y)/2-28*Math.min(sc,1.5);
    const isFocus = sel&&(sel.id===l.s||sel.id===l.t);
    const isHov = hovId&&(hovId===l.s||hovId===l.t);
    const alpha = isFocus ? 0.75 : isHov ? 0.45 : 0.1;
    ctx.beginPath();
    ctx.moveTo(pa.x,pa.y);
    ctx.quadraticCurveTo(mx,my,pb.x,pb.y);
    const hex=Math.round(alpha*255).toString(16).padStart(2,'0');
    ctx.strokeStyle=l.color+hex;
    ctx.lineWidth=Math.max(0.5, l.str*2*Math.min(sc,1.2));
    ctx.stroke();
  });

  // 노드
  Object.values(PH).forEach(p=>{
    const pos=w2s(p.x,p.y);
    if(pos.x<-60||pos.x>W+60||pos.y<-60||pos.y>H+60) return;
    const r=p.r*Math.min(sc,2);
    const isSel=sel&&sel.id===p.id;
    const isHov=hovId===p.id;

    if(isSel||isHov){
      const grd=ctx.createRadialGradient(pos.x,pos.y,r*0.5,pos.x,pos.y,r*2.2);
      grd.addColorStop(0,p.color+'44'); grd.addColorStop(1,'transparent');
      ctx.beginPath(); ctx.arc(pos.x,pos.y,r*2.2,0,Math.PI*2);
      ctx.fillStyle=grd; ctx.fill();
    }

    ctx.beginPath(); ctx.arc(pos.x,pos.y,r,0,Math.PI*2);
    ctx.fillStyle=p.color+(isSel?'ff':isHov?'ee':'cc');
    ctx.fill();
    ctx.strokeStyle=isSel?'#ffffff88':p.color+'99';
    ctx.lineWidth=isSel?1.5:0.8;
    ctx.stroke();

    if(sc>0.3){
      const fs=Math.max(9,10*Math.min(sc,1.3));
      ctx.fillStyle=isSel?'#fff':isHov?'#eee':'rgba(210,208,255,0.82)';
      ctx.font=`${fs}px sans-serif`;
      ctx.textAlign='center';
      ctx.fillText(p.name,pos.x,pos.y-r-3*Math.min(sc,1.5));
    }
  });
}

function rv(){
  sc = W/(CW*0.6);
  ox = -20*sc; oy = 60;
  draw();
}

function zm(f){
  const cx=W/2, cy=H/2;
  const wb=s2w(cx,cy);
  sc=Math.max(0.15,Math.min(5,sc*f));
  ox=cx-wb.x*sc; oy=cy-wb.y*sc;
  draw();
}

// 이벤트
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const wb=s2w(mx,my);
  sc=Math.max(0.15,Math.min(5,sc*(e.deltaY<0?1.1:0.91)));
  ox=mx-wb.x*sc; oy=my-wb.y*sc;
  draw();
},{passive:false});

canvas.addEventListener('mousedown',e=>{
  drag=true; moved=false; lx=e.clientX; ly=e.clientY;
});

canvas.addEventListener('mousemove',e=>{
  if(drag){
    const dx=e.clientX-lx, dy=e.clientY-ly;
    if(Math.abs(dx)+Math.abs(dy)>3) moved=true;
    ox+=dx; oy+=dy; lx=e.clientX; ly=e.clientY; draw();
  } else {
    const rect=canvas.getBoundingClientRect();
    const wpos=s2w(e.clientX-rect.left,e.clientY-rect.top);
    let hit=null;
    Object.values(PH).forEach(p=>{
      if(Math.hypot(p.x-wpos.x,p.y-wpos.y)<p.r+8) hit=p.id;
    });
    if(hit!==hovId){ hovId=hit; draw(); }
    const tip=document.getElementById('tip');
    if(hit){
      const ph=PH[hit];
      tip.textContent=ph.name+' '+ph.life;
      tip.style.display='block';
      tip.style.left=(e.clientX-rect.left+14)+'px';
      tip.style.top=(e.clientY-rect.top-32)+'px';
    } else tip.style.display='none';
  }
});

canvas.addEventListener('mouseup',e=>{
  drag=false;
  if(!moved){
    const rect=canvas.getBoundingClientRect();
    const wpos=s2w(e.clientX-rect.left,e.clientY-rect.top);
    let hit=null;
    Object.values(PH).forEach(p=>{
      if(Math.hypot(p.x-wpos.x,p.y-wpos.y)<p.r+8) hit=p;
    });
    if(hit) showCard(hit);
    else { sel=null; document.getElementById('card').style.display='none'; draw(); }
  }
});
canvas.addEventListener('mouseleave',()=>{ drag=false; hovId=null; document.getElementById('tip').style.display='none'; draw(); });

// 터치
let tl={x:0,y:0}, tpinch=0;
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===1){
    drag=true; moved=false;
    lx=e.touches[0].clientX; ly=e.touches[0].clientY;
  } else if(e.touches.length===2){
    drag=false;
    tpinch=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  }
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&drag){
    const dx=e.touches[0].clientX-lx, dy=e.touches[0].clientY-ly;
    if(Math.abs(dx)+Math.abs(dy)>3) moved=true;
    ox+=dx; oy+=dy; lx=e.touches[0].clientX; ly=e.touches[0].clientY; draw();
  } else if(e.touches.length===2){
    const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const f=dist/tpinch; tpinch=dist;
    const cx=(e.touches[0].clientX+e.touches[1].clientX)/2;
    const cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
    const rect=canvas.getBoundingClientRect();
    const wb=s2w(cx-rect.left,cy-rect.top);
    sc=Math.max(0.15,Math.min(5,sc*f));
    ox=(cx-rect.left)-wb.x*sc; oy=(cy-rect.top)-wb.y*sc;
    draw();
  }
},{passive:false});
canvas.addEventListener('touchend',e=>{
  if(!moved&&e.changedTouches.length===1){
    const rect=canvas.getBoundingClientRect();
    const wpos=s2w(e.changedTouches[0].clientX-rect.left,e.changedTouches[0].clientY-rect.top);
    let hit=null;
    Object.values(PH).forEach(p=>{
      if(Math.hypot(p.x-wpos.x,p.y-wpos.y)<p.r+10) hit=p;
    });
    if(hit) showCard(hit);
  }
  drag=false;
});

function showCard(p){
  sel=p; draw();
  document.getElementById('cn').textContent=p.name;
  document.getElementById('cl').textContent=p.life+' · 영향력 '+Math.round(p.inf*100)+'% · 입문자 중요도 '+Math.round(p.beg*100)+'%';
  document.getElementById('cq').textContent='핵심 질문: '+p.q;
  document.getElementById('cs').textContent=p.summary;
  document.getElementById('ct').innerHTML=p.themes.map(t=>`<span>${t}</span>`).join('');
  document.getElementById('cw').textContent=p.works.length?'대표 저작: '+p.works.join(' · '):'';
  const rels=LINKS.filter(l=>l.s===p.id||l.t===p.id).slice(0,6).map(l=>{
    const other=PH[l.s===p.id?l.t:l.s];
    return other?`[${l.type}] ${other.name}`:'';}).filter(Boolean);
  document.getElementById('cr').textContent=rels.join('  ');
  document.getElementById('card').style.display='block';
}

function cc(){
  document.getElementById('card').style.display='none';
  sel=null; draw();
}

resize();
</script>
</body>
